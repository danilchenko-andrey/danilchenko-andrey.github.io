<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Andrei Danilchenko dev page</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0f1117;
        color: #e8eaf0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        margin-bottom: 1.75rem;
      }

      .avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      nav {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      nav a {
        display: inline-block;
        padding: 0.45rem 1.1rem;
        border: 1px solid #3a3d4a;
        border-radius: 6px;
        color: #b0b8cc;
        text-decoration: none;
        font-size: 0.95rem;
        transition: border-color 0.15s, color 0.15s;
      }

      nav a:hover {
        border-color: #7b8cad;
        color: #e8eaf0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <img src="images/avatar.png" alt="Andrei Danilchenko" class="avatar">
        <h1>Andrei Danilchenko</h1>
      </div>
      <nav>
        <a href="https://github.com/danilchenko-andrey">GitHub</a>
        <a href="https://www.linkedin.com/in/danilchenko/">LinkedIn</a>
        <a href="https://twitter.com/mir_nomer_nol">X</a>
      </nav>
    </main>
  </body>
</html>
